ai_usage_summary: |
  Used AI assistance for code review, validation, and submission-readiness checks.
  The ranking step itself is a local CPU-only Python script and does not call hosted
  LLMs or external APIs.

methodology_summary: |
  A pure Heuristic hybrid ranker that blends semantic cross-encoder matching (50% weight),
  BM25 lexical retrieval (23% weight), and career history co-occurrence (27% weight),
  calibrated with behavioral multipliers (activity decay, recruiter response/time,
  interview completion, notice days, and skill trust). This approach avoids GBDT circularity
  (since there are no human placement labels, GBDT only approximates the rules) and
  avoids GBDT lexical dominance (where trees greedily split on BM25 and ignore semantic
  scores, dropping semantic correlation in the shortlist from 0.49 to 0.35). The pipeline
  first filters profiles via hard gates (experience, relocation, blacklist, work mode)
  and then scores survivors. An optional GBDT LambdaMART ranker is also trained and
  fully supported (`--use-learned-combiner`). The default run completes locally in under 2 seconds.

